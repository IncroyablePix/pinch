name: CI

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build and package
        run: npm run pack

      - name: Upload Chromium package
        uses: actions/upload-artifact@v4
        with:
          name: pinch-chromium
          path: packages/pinch-chromium.zip

      - name: Upload Firefox package
        uses: actions/upload-artifact@v4
        with:
          name: pinch-firefox
          path: packages/pinch-firefox.zip
